# Research Domain Configuration
# This file is the SINGLE SOURCE OF TRUTH for research domains in NeuriCo.
#
# Adding a new domain:
#   1. Add an entry below with name, description, and (optional) keywords/paper_style
#   2. (Optional) Create templates/domains/<domain_name>/core.txt for domain methodology
#   3. (Optional) Create templates/domains/<domain_name>/{paper_writer,resource_finder,session_instructions}.txt
#      for agent overrides
#   4. (Optional) Create templates/paper_styles/<paper_style>/ if you need a new LaTeX style
#
# Source code reads everything from this file — no source edits needed for new domains.

# Default domain to use when an unknown domain is specified
default_domain: artificial_intelligence

# Default paper style (used when a domain has no specific paper_style set)
default_paper_style: neurips

# Available research domains
domains:
  artificial_intelligence:
    name: "Artificial Intelligence"
    description: "LLM research, prompt engineering, AI agents, benchmarks"
    has_template: true
    keywords:
      - llm
      - language model
      - nlp
      - text
      - gpt
      - bert
      - transformer
      - prompt
      - token

  machine_learning:
    name: "Machine Learning"
    description: "Model training, evaluation, hyperparameter tuning"
    has_template: true
    keywords:
      - regression
      - classification
      - clustering
      - supervised
      - unsupervised
      - gradient
      - neural

  data_science:
    name: "Data Science"
    description: "Exploratory data analysis, statistical analysis, visualization"
    has_template: true
    keywords:
      - data analysis
      - statistics
      - prediction
      - forecasting
      - tabular

  nlp:
    name: "Natural Language Processing"
    description: "Traditional NLP tasks (non-LLM), text processing"
    has_template: false  # Will use default
    keywords:
      - tokenization
      - parsing
      - named entity
      - sentiment
      - syntactic
      - dependency parsing

  computer_vision:
    name: "Computer Vision"
    description: "Image processing, object detection, visual analysis"
    has_template: false  # Will use default
    keywords:
      - vision
      - image
      - cnn
      - object detection
      - segmentation
      - diffusion

  reinforcement_learning:
    name: "Reinforcement Learning"
    description: "Agent training, policy evaluation, RL algorithms"
    has_template: false  # Will use default
    keywords:
      - reinforcement
      - " rl "
      - reward
      - policy
      - agent
      - environment

  systems:
    name: "Systems"
    description: "Performance benchmarking, optimization, distributed systems"
    has_template: false  # Will use default
    keywords:
      - distributed
      - database
      - network
      - operating system
      - compiler

  theory:
    name: "Theory"
    description: "Algorithmic analysis, complexity theory, formal methods"
    has_template: false  # Will use default
    keywords:
      - algorithm
      - complexity
      - optimization

  mathematics:
    name: "Mathematics"
    description: "Pure and applied mathematics: algebra, analysis, topology, number theory, combinatorics, geometry, proofs"
    has_template: true
    paper_style: ams
    keywords:
      - theorem
      - proof
      - conjecture
      - lemma
      - algebra
      - topology
      - number theory
      - combinatorics
      - graph theory
      - manifold
      - homomorphism
      - isomorphism
      - eigenvalue
      - differential equation
      - synchronization
      - bifurcation
      - dynamical system

  # Default Lean-enabled mathematics domain. Every theorem is machine-checked by
  # Lean 4 + Mathlib via the hosted Axiom AXLE API (no local Lean toolchain), so it
  # runs on the default Neurico image. Templates: templates/domains/mathematics_lean/;
  # verifier: the `axiom-lean-prover` skill (axle_check.py). Requires AXLE_API_KEY.
  mathematics_lean:
    name: "Mathematics (Lean)"
    description: "Formal mathematics with Lean 4 proof verification: every theorem is machine-checked against Mathlib via the hosted Axiom AXLE API (no local Lean toolchain; runs on the default Neurico image). Choose this over plain 'mathematics' when the idea calls for machine-checked / formally-verified proofs, a proof assistant, Lean, or Mathlib."
    has_template: true
    paper_style: ams
    keywords:
      - lean
      - lean 4
      - lean4
      - mathlib
      - formal proof
      - formally verified
      - formal verification
      - machine-checked
      - machine checked
      - proof assistant
      - type checker
      - axle
      - axiom axle

  # ── RESERVED (not an active domain) ───────────────────────────────────────
  # Self-built local Lean variant: a real lake + local Mathlib cache toolchain
  # (machine-checked by the local Lean type checker rather than the AXLE cloud
  # API). Superseded by the AXLE-backed `mathematics_lean` above, which needs no
  # local toolchain. Implementation is kept for reference:
  #   templates: templates/domains/mathematics_lean_local/
  #   skill:     templates/skills/lean-prover/  (vs. axiom-lean-prover)
  # To re-enable, uncomment this block.
  # mathematics_lean_local:
  #   name: "Mathematics (Lean, local toolchain)"
  #   description: "Formal mathematics with Lean 4 proof verification using a self-built local lake/Mathlib toolchain, machine-checked by the local Lean type checker."
  #   has_template: true
  #   paper_style: ams

  finance:
