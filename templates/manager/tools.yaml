# Tool definitions for the NeuriCo Interactive Manager
# These are loaded into the system prompt for the manager LLM
# and also used to generate API tool schemas when using API backends.

tools:
  - name: run_agent
    description: |
      Launch a research agent inside the Docker container. The agent runs
      in the background and you can check its status later. Each invocation
      gets a unique run_id for tracking.
    parameters:
      agent:
        type: string
        enum: [resource_finder, experiment_runner, paper_writer, comment_handler]
        description: Which agent to run
        required: true
      provider:
        type: string
        enum: [claude, codex, gemini]
        description: AI provider for the agent (default uses session provider)
        required: false
      paper_style:
        type: string
        enum: [neurips, icml, acl, ams]
        description: Paper style template (only for paper_writer agent)
        required: false
      use_scribe:
        type: boolean
        description: Use Jupyter notebook integration (only for experiment_runner)
        required: false
      rationale:
        type: string
        description: |
          Critique-before-compute: a one-sentence justification for spending
          compute on this run NOW — which hypothesis it tests, why it is worth
          it, and confirmation it is not a known dead-end retry. Always provide
          this; it is recorded in the research state.
        required: false
      hypothesis:
        type: string
        description: |
          The hypothesis (or its id, e.g. "H2") this run is meant to test, if any.
        required: false
    returns: |
      A run_id string and immediate status. Use check_workspace or
      read_agent_logs to monitor progress. The agent result will be
      available at .neurico/runs/<run_id>/result.json when complete.

  - name: check_workspace
    description: |
      Read files from the research workspace to understand current state.
      Can list directory contents or read specific files.
    parameters:
      action:
        type: string
        enum: [list, read]
        description: "list: show directory contents. read: show file content."
        required: true
      path:
        type: string
        description: |
          Relative path within the workspace. Use "." for root.
          Examples: ".", "literature_review.md", "results/", "logs/resource_finder_claude.log"
        required: true
      max_lines:
        type: integer
        description: Maximum lines to return when reading a file (default 200)
        required: false
    returns: Directory listing or file content as text.

  - name: read_agent_logs
    description: |
      Read recent log output from a running or completed agent.
      Useful for understanding what an agent is doing or why it failed.
    parameters:
      run_id:
        type: string
        description: The run_id of the agent invocation to check
        required: true
      tail_lines:
        type: integer
        description: Number of lines from the end of the log to return (default 100)
        required: false
    returns: |
      Agent status (running/completed/failed) and recent log lines.
      If the agent wrote a result.json or error.json, those are included too.

  - name: ask_user
    description: |
      Present a message, question, or decision to the human researcher
      and wait for their response. Use this for critical decision points,
      not routine updates.
    parameters:
      message:
        type: string
        description: |
          The message to show the user. Should be concise (2-4 paragraphs max).
          Lead with findings, end with a question or options.
        required: true
      options:
        type: array
        items:
          type: string
        description: |
          Optional list of specific options to present. If provided,
          the user will be prompted to choose. If not, free-form input.
        required: false
    returns: The user's response as a string.

  - name: update_session
    description: |
      Update the session state with key findings, open questions, or
      other metadata. This persists across session restarts and helps
      maintain context over long research sessions.
    parameters:
      key_findings:
        type: array
        items:
          type: string
        description: Key findings to add to the session (append, not replace)
        required: false
      open_questions:
        type: array
        items:
          type: string
        description: Open questions to track (replaces existing list)
        required: false
      phase:
        type: string
        description: Current research phase label (e.g., "exploring", "experimenting", "writing")
        required: false
    returns: Confirmation of the update.

  - name: update_research_state
    description: |
      Update your WORLD MODEL of the investigation — the structured picture you
      reason over and that the human sees on the Research whiteboard. Use this
      continuously, the way a PI keeps a running mental model: when you form or
      revise a hypothesis, confirm or kill one, get a result, identify the crux,
      or make a decision. This is more important than chat: the chat is
      conversation, this is the shared state of the science.
    parameters:
      narrative:
        type: string
        description: One short paragraph on where the research stands right now.
        required: false
      current_best:
        type: string
        description: The current best result / champion approach, with its key number(s).
        required: false
      crux:
        type: string
        description: |
          The single most decision-relevant open issue right now — the thing
          that, if resolved, would most change what we do next.
        required: false
      hypotheses:
        type: array
        items:
          type: object
        description: |
          Hypotheses to add or update (upsert by id or matching statement). Each:
          {"statement": "...", "status": "alive|uncertain|supported|dead",
           "evidence": "...", "id": "H2"(optional)}.
        required: false
      findings:
        type: array
        items:
          type: object
        description: |
          The SPINE of the world model: each finding is a unit of insight the run
          produced. Append, deduped by text. An item may be a bare string or an
          object: {"text": "...", "insight": "the so-what / implication"(optional),
          "kind": "result|dead_end|note"(optional, default result)}. Record a
          finding, then attach the decisions that produced it via decision.finding.
        required: false
      dead_ends:
        type: array
        items:
          type: string
        description: |
          Directions found unproductive — recorded so they are not retried
          (an AutoScientists-style dead-end registry).
        required: false
      open_questions:
        type: array
        items:
          type: string
        description: Open questions to track (replaces the list).
        required: false
      resolved_questions:
        type: array
        items:
          type: string
        description: |
          Open questions that have now been ANSWERED — they are removed from the
          list (matched case-insensitively). Use this to prune resolved questions
          without re-listing the whole set, so the board doesn't show answered
          questions as still open.
        required: false
      decision:
        type: object
        description: |
          A decision just made, to log with its reasoning. Every decision belongs
          to the finding it helped produce, or to "global" for a project-wide fork
          (e.g. orchestration: which agent to run, how to scope, when to stop):
          {"question": "...", "chosen": "...", "rationale": "...",
           "options": ["...", "..."](optional),
           "finding": "F2 | global"(the finding id this fork serves; default global),
           "layer": "hypothesis|method|experiment_design|interpretation"(optional)}.
          Layers: hypothesis = what to test; method = the way (library, metric,
          threshold, prompt); experiment_design = dataset/baseline/scope/seed;
          interpretation = what the result means / whether it counts as a finding.
          A decision made before its finding exists may use "global" for now.
        required: false
      incident:
        type: string
        description: |
          Self-reported struggle — if you got confused, hit an error, called a
          tool that doesn't exist, or recovered from a mistake, describe it here.
          Recorded on the whiteboard as a self_reported incident. Tool errors are
          also auto-logged; don't paper over what went wrong.
        required: false
    returns: Confirmation of what was updated.

  - name: design_panel
    description: |
      Shape the Research whiteboard for THIS run. You decide what form best fits
      the investigation: choose the ORDER of sections and define CUSTOM sections
      from a fixed block vocabulary. Do this ONCE near the start (after you
      understand the idea); afterwards call it only to refresh a custom section's
      data. The built-in sections (crux, current_best, narrative, findings,
      hypotheses, open_questions, decisions, experiments) still come from
      update_research_state — list their ids in `layout` to position them
      among your custom ones. A molecule-screening run might add a "candidates"
      table; an ML run a "leaderboard"; a proof a "lemmas" status_list. Supply
      DATA, never markup — all text is escaped before display.
    parameters:
      layout:
        type: array
        items:
          type: string
        description: |
          Ordered list of section ids to render, top to bottom. May mix built-in
          ids (crux, current_best, narrative, findings, hypotheses,
          open_questions, decisions, experiments) and your custom section ids.
          Omit or leave empty to keep the default order. Any custom section not
          listed is appended at the end.
        required: false
      sections:
        type: array
        items:
          type: object
        description: |
          Custom sections to create or update (upsert by id). Each:
          {"id": "candidates", "title": "Candidate molecules", "kind": "table",
           "data": ...}. `kind` is one of:
            - text         data: a string (one paragraph)
            - bullet_list  data: ["item", "item", ...]
            - key_value    data: [{"key": "...", "value": "..."}] or an object
            - table        data: {"columns": ["A","B"], "rows": [["1","2"], ...]}
            - status_list  data: [{"status": "alive|uncertain|supported|dead|...",
                                    "label": "...", "note": "..."}]
          Re-send a section with new `data` to update it in place.
        required: false
    returns: Confirmation of what was updated (layout and/or section count).
